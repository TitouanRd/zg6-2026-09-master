set CHIPNAME stm32f401
set WORKAREASIZE 0x18000
source [find board/st_nucleo_f4.cfg]

[target current] configure -event gdb-attach {
	arm semihosting enable
#	arm semihosting_fileio enable
	arm semihosting_redirect tcp 5555 stdio
#}
[target current] configure -event gdb-detach {
	arm semihosting_redirect disable
#	arm semihosting_fileio disable
	arm semihosting disable
}
